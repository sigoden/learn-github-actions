name: SSH into MacOS

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13' 
      - uses: dtolnay/rust-toolchain@stable
      - name: Setup tmate session
        uses: mxschmitt/action-tmate@v3